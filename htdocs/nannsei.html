<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/nantou.css">
    <title>nantou</title>
</head>
<body>
    <div class="container">
        <!-- 上部の円形アイコン -->
        <div class="top-icons">
            <div class="circle text-circle">駅</div>
            <div class="circle text-circle">南</div>
            <div class="circle text-circle">西</div>
            <div class="circle text-circle">エ</div>
            <div class="circle text-circle">リ</div>
            <div class="circle text-circle">ア</div>
        </div>

        <!-- レイアウト全体 -->
        <div class="content">
            <!-- 左側のボックス -->
            <div class="left-side">
                <div class="box">
                    <div class="time">00:00</div>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <img src="./items/mina/マンション.jpg" alt="Image" class="box-image">
                        <p class="box-text">文章</p>
                    </div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <div class="box-area">
                            <img src="./items/mina/湘南パンケーキ.jpg" alt="pancake" class="box-image">
                            <img src="./items/mina/メニュー.jpg" alt="menu" class="box-image">
                        </div>
                        <p class="box-text">example</p>
                    </div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <img src="./items/mina/奏の杜.jpg" alt="Image" class="box-image">
                        <p class="box-text">example</p>
                    </div>
                </div>
            </div>

            <!-- 中央の縦線 -->
            <div class="center-line"></div>

            <!-- 右側のボックス -->
            <div class="right-side">
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <img src="./items/mina/公園.jpg" alt="Image" class="box-image">
                        <img src="./items/mina/公園２.jpg" alt="Image" class="box-image">
                        <p class="box-text">example</p>
                    </div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <img src="./items/mina/パン屋外.jpg" alt="Image" class="box-image">
                        <img src="./items/mina/パン屋中.jpg" alt="Image" class="box-image">
                        <p class="box-text">example</p>
                    </div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                    <div class="box-content">
                        <img src="./items/mina/ベルク.jpg" alt="Image" class="box-image">
                        <p class="box-text">example</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
