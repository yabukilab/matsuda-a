<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./css/nantou.css">
    <title>nantou</title>
</head>
<body>
    <div class="container">
        <!-- 上部の円形アイコン -->
        <div class="top-icons">
            <div class="circle text-circle">駅</div>
            <div class="circle text-circle">南</div>
            <div class="circle text-circle">東</div>
            <div class="circle text-circle">エ</div>
            <div class="circle text-circle">リ</div>
            <div class="circle text-circle">ア</div>
        </div>

        <!-- レイアウト全体 -->
        <div class="content">
            <!-- 左側のボックス -->
            <div class="left-side">
                <div class="box">
                    <div class="time">00:00</div>
                    <div class="horizontal-line"></div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                </div>
            </div>

            <!-- 中央の縦線 -->
            <div class="center-line"></div>

            <!-- 右側のボックス -->
            <div class="right-side">
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                </div>
                <div class="box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                </div>
                <div class="box small-box">
                    <span class="time">00:00</span>
                    <div class="horizontal-line"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
