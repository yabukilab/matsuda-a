<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼に住む！</title>
    <style>
        /* 全体のスタイルをリセット */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* bodyに背景色を設定 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #d9e8d8; /* ページ全体の淡い緑色の背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* コンテナ全体の設定 */
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff; /* コンテナの背景色 */
            border: 10px solid #a8cba1; /* 緑色の枠線 */
            border-radius: 10px; /* コンテナの角を丸くする */
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); /* コンテナに影をつける */
        }

        /* ヘッダーの設定 */
        .header {
            text-align: center;
            color: #d23f42; /* ヘッダーの赤色文字 */
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .header h2 {
            font-size: 18px;
        }

        /* コンテンツのボックス */
        .content-boxes {
            display: flex;
            flex-direction: column;
            gap: 20px; /* ボックス間の隙間 */
        }

        /* ボックスのデザイン */
        .box {
            height: 200px;
            background-color: #f0f9f0; /* ボックスの薄い緑色の背景 */
            border: 2px solid #a8cba1; /* 緑色の枠線 */
            border-radius: 5px; /* ボックスの角を丸くする */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>【津田沼】に住む！</h1>
            <h2>～駅周辺の生活を紹介～</h2>
        </div>
        <div class="content-boxes">
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
