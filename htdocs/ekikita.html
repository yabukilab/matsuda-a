<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script src="pic.js" defer></script>
    <title>ekikita</title>
</head>
<body>
    <header class="header">
        <div class="headerNavOuter">
            <h1 class="siteTitle">
                <a class="visited" href="./index.html" style="text-decoration-line: none">【津田沼】に住む！</a>
            </h1>

            <!-- ナビゲーション -->
            <nav class="headerNav">
                <ul class="navList">
                    <li class="navItem">
                        <a href="./index.html">TOP</a>
                    </li>
                    <li class="navItem">
                        <a href="./ekikita.html">駅北エリア</a>
                    </li>
                    <li class="navItem">
                        <a href="./nannsei.html">駅南西エリア</a>
                    </li>
                    <li class="navItem">
                        <a href="./nantou.html">駅南東エリア</a>
                    </li>
                </ul>
            </nav>

            <!-- ハンバーガーボタン -->
            <div class="hamburger-button" id="hamburger">
                <span class="hamburger-line hamburger-line-1"></span>
                <span class="hamburger-line hamburger-line-2"></span>
                <span class="hamburger-line hamburger-line-3"></span>
            </div>

            <!-- ハンバーガーボタンをクリックした後に現れる半透明背景 -->
            <div class="bg" id="bg"></div>
        </div>

    </header>

    <main class="ekikita">
        <div class="container">
            <!-- 上部の円形アイコン -->
            <div class="top-icons">
                <div class="circle text-circle">駅</div>
                <div class="circle text-circle">北</div>
                <div class="circle text-circle">エ</div>
                <div class="circle text-circle">リ</div>
                <div class="circle text-circle">ア</div>
            </div>

            <!-- レイアウト全体 -->
            <div class="content">
                <!-- 左側のボックス -->
                <div class="left-side">
                    <div class="box">
                        <div class="time">09:00</div>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985178_0.jpg" alt="Image" class="box-image">
                            <img src="./items/riku/S__39985176_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">住宅街の近くにコンビニやTimesがありちょっとした買い物や車の移動に便利！</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985169_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">子供が遊びたくなっても中に遊べる施設あり！</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985160_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">住宅街の近くにも大きな公園があるから子供と遅くまで遊んでも安心</p>
                        </div>
                    </div>
                </div>

                <!-- 中央の縦線 -->
                <div class="center-line"></div>

                <!-- 右側のボックス -->
                <div class="right-side">
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985167_0.jpg" alt="Image" class="box-image">
                            <img src="./items/riku/S__39985174_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">仕事後は子供を連れて一緒に買い物</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985171_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">買えるものも豊富で仕事終わりの買い物には十分</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/riku/S__39985165_0.jpg" alt="Image" class="box-image">
                            <p class="box-text">商業施設の近くには小さいが公園があり外で遊んだり、ピクニックしたりするにはいい場所</p>
                        </div>
                    </div>
                </div>
                <div id="zoomback">
                    <img id="zooming" src="./items/placeholder.png" alt="zoom">
                </div>
            </div>
        </div>
    </main>
    <script src="hamburger.js"></script>
</body>
</html>
