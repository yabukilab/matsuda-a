<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/nantou.css">
    <script src="pic.js" defer></script>
    <title>nantou</title>
</head>
<body>
    <header class="header">
        <div class="headerNavOuter">
            <h1 class="siteTitle">
                【津田沼】に住む！
            </h1>

            <!-- ナビゲーション -->
            <nav class="headerNav">
                <ul class="navList">
                    <li class="navItem">
                        <a href="./index.html">TOP</a>
                    </li>
                    <li class="navItem">
                        <a href="./ekikita.html">駅北エリア</a>
                    </li>
                    <li class="navItem">
                        <a href="./nannsei.html">駅南西エリア</a>
                    </li>
                    <li class="navItem">
                        <a href="./nantou.html">駅南東エリア</a>
                    </li>
                </ul>
            </nav>

            <!-- ハンバーガーボタン -->
            <div class="hamburger-button" id="hamburger">
                <span class="hamburger-line hamburger-line-1"></span>
                <span class="hamburger-line hamburger-line-2"></span>
                <span class="hamburger-line hamburger-line-3"></span>
            </div>

            <!-- ハンバーガーボタンをクリックした後に現れる半透明背景 -->
            <div class="bg" id="bg"></div>
        </div>

    </header>

    <main>
        <div class="container">
            <!-- 上部の円形アイコン -->
            <div class="top-icons">
                <div class="circle text-circle">駅</div>
                <div class="circle text-circle">南</div>
                <div class="circle text-circle">東</div>
                <div class="circle text-circle">エ</div>
                <div class="circle text-circle">リ</div>
                <div class="circle text-circle">ア</div>
            </div>

            <!-- レイアウト全体 -->
            <div class="content">
                <!-- 左側のボックス -->
                <div class="left-side">
                    <div class="box">
                        <div class="time">09:00</div>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="./items/kent/18642_color.png" alt="Image" class="box-image">
                            <p class="box-text">テキストテキストテキスト</p>
                        </div>
                        <div class="box-comment">
                            <img src="./items/kent/18642_color.png" alt="woman" class="comment-image">
                            <p class="comment-text">コメントテキスト</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <!-- デフォルトの画像（src が空の場合） -->
                            <img src="./items/kent/IMG_1413.JPG" alt="Image" class="box-image">
                            <p class="box-text">コメダ</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <!-- src が空であればデフォルト画像が表示されるように修正 -->
                            <img src="your-image.jpg" alt="Image" class="box-image" onerror="handleImageError(this)">
                            <p class="box-text">example</p>
                        </div>
                    </div>
                </div>

                <!-- 中央の縦線 -->
                <div class="center-line"></div>

                <!-- 右側のボックス -->
                <div class="right-side">
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="your-image.jpg" alt="Image" class="box-image" onerror="handleImageError(this)">
                            <p class="box-text">example</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="your-image.jpg" alt="Image" class="box-image" onerror="handleImageError(this)">
                            <p class="box-text">example</p>
                        </div>
                    </div>
                    <div class="box">
                        <span class="time">00:00</span>
                        <div class="horizontal-line"></div>
                        <div class="box-content">
                            <img src="your-image.jpg" alt="Image" class="box-image" onerror="handleImageError(this)">
                            <p class="box-text">example</p>
                        </div>
                    </div>
                </div>
                <div id="zoomback">
                    <!-- 初期状態ではデフォルト画像 -->
                    <img id="zooming" src="./items/placeholder.png" alt="zoom-test">
                </div>
            </div>
        </div>
    </main>
    <script src="hamburger.js"></script>
</body>
</html>
